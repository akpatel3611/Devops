<template>
    <div class="slds-p-horizontal_x-small slds-p-vertical_xx-small slds-border slds-border_color_weak slds-border_radius slds-m-bottom_small">
        
        <!-- HEADER -->
        <div class="slds-text-title_caps slds-m-bottom_small">
            Async Operation Status </div>

        <p>demo for deploying main to other sf org  </p>
        <!-- EMPTY STATE -->
        <template if:false={processList.length}>
            <div class="slds-text-color_weak slds-text-align_center slds-p-around_medium">
                No active background processes.
            </div>
        </template>

        <!-- PROCESS LIST -->
        <template if:true={processList.length}>
            <template for:each={processList} for:item="process">
                
                <div key={process.jobId} class="slds-box slds-theme_default slds-p-around_small slds-m-bottom_small">
                    
                    <!-- TITLE ROW -->
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                        
                        <!-- SPINNER (Only if isLoading is true) -->
                        <template if:true={process.isLoading}>
                            <div class="slds-m-right_small slds-is-relative" style="width: 1rem; height: 1rem;">
                                <lightning-spinner alternative-text="Loading" size="small" variant="brand"></lightning-spinner>
                            </div>
                        </template>

                        <!-- OPERATION NAME -->
                        <div class="slds-text-body_small">
                            <strong>{process.resourceType}</strong> - {process.operationName}
                        </div>
                    </div>

                    <!-- STATUS MESSAGE -->
                    <div class="slds-text-body_small slds-m-bottom_x-small slds-text-color_weak">
                        {process.message}
                    </div>

                    <!-- PROGRESS BAR -->
                    <!-- value prop binds directly to JS progress variable -->
                    <lightning-progress-bar 
                        value={process.progress} 
                        size="large"
                        variant="circular">
                    </lightning-progress-bar>

                </div>
            </template>
        </template>
    </div>
</template>
