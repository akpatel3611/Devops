<template>
    <!-- ================= HEADER ================= -->
    <div class="slds-p-around_small slds-border_bottom slds-theme_shade"
         style="position:sticky;top:0;z-index:5;">

        <h2 class="slds-text-heading_small slds-m-bottom_x-small">
            Record Graph Explorer
        </h2>

        <div class="slds-grid slds-gutters">

            <div class="slds-col slds-size_3-of-12">
                <lightning-combobox
                    label="Select Object"
                    value={selectedObjectApi}
                    options={objectOptions}
                    onchange={handleObjectChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_6-of-12" style="position:relative;">
                <lightning-input
                    type="search"
                    label="Search Records"
                    onchange={handleRecordSearch}>
                </lightning-input>

                <template if:true={showSearchResults}>
                    <div class="slds-box slds-theme_default"
                         style="position:absolute;top:58px;width:100%;max-height:180px;overflow:auto;z-index:20;">

                        <template if:true={hasSearchResults}>
                            <template for:each={searchResults} for:item="rec">
                                <div key={rec.recordId}
                                     data-id={rec.recordId}
                                     onclick={handleRecordSelect}
                                     class="slds-p-around_x-small slds-border_bottom slds-truncate"
                                     style="cursor:pointer;">
                                    {rec.recordName}
                                </div>
                            </template>
                        </template>

                        <template if:false={hasSearchResults}>
                            <div class="slds-text-color_weak slds-p-around_small">
                                No matching records found
                            </div>
                        </template>

                    </div>
                </template>
            </div>

            <div class="slds-col slds-size_3-of-12 slds-text-align_right">
                <lightning-button
                    label="Standard List View"
                    onclick={openStandardList}>
                </lightning-button>
            </div>

        </div>
    </div>

    <!-- ================= BODY ================= -->
    <div style="height:calc(80vh - 84px);overflow:hidden;display:flex;">

        <!-- LEFT PANEL (OVERLAY) -->
        <template if:true={leftPanelOpen}>
            <div style=" width:300px; height:100%; background:#f4f6f9;
             border-right:2px solid #0176d3; padding:12px; flex-shrink:0; overflow:auto;">

                <!-- PANEL HEADER -->
                <div style="display:flex;align-items:center;margin-bottom:8px;">
                    <div onclick={toggleLeftPanel}
                         style="width:28px;height:28px;border:1px solid #d8dde6;
                                border-radius:4px;display:flex;
                                align-items:center;justify-content:center;
                                cursor:pointer;background:white;">
                        ☰
                    </div>
                    <div class="slds-text-title_bold slds-m-left_small">
                        Related Objects
                    </div>
                </div>

                <lightning-input type="search" label="Search Object" 
                    value={relatedObjectSearchKey} onchange={handleRelatedObjectSearch} 
                    data-id="relatedSearch">
                </lightning-input>


                <div style="max-height:180px;overflow:auto;margin-top:8px;">
                    <template if:true={filteredRelatedObjects.length}>
                        <template for:each={filteredRelatedObjects} for:item="obj">
                            <div key={obj.value}
                                 data-value={obj.value}
                                 onclick={selectRelatedObject}
                                 class="slds-p-around_x-small slds-border_bottom"
                                 style="cursor:pointer;">
                                {obj.label}
                            </div>
                        </template>
                    </template>

                    <template if:false={filteredRelatedObjects.length}>
                        <div class="slds-text-color_weak slds-p-around_small">
                            No related object found
                        </div>
                    </template>
                </div>

                <template if:true={selectedRelatedObjects.length}>
                    <div class="slds-m-top_medium slds-pill_container"
                         style="display:flex;flex-wrap:wrap;">
                        <template for:each={selectedRelatedObjects} for:item="obj">
                            <span key={obj} class="slds-pill slds-m-right_x-small slds-m-bottom_x-small">

                                <span class="slds-pill__label">{obj}</span>

                                <button class="slds-button slds-button_icon"
                                        data-value={obj}
                                        onclick={removeSelectedObject}>✕</button>
                            </span>
                        </template>
                    </div>

                    <div class="slds-m-top_medium slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-button label="SView"
                                              onclick={showStandardHierarchy}>
                            </lightning-button>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-button label="View"
                                              variant="brand"
                                              onclick={showSelectedHierarchy}>
                            </lightning-button>
                        </div>
                    </div>
                </template>

            </div>
        </template>

        <!-- MAIN CONTENT -->
        <div style="flex:1;position:relative;overflow:hidden;padding:0 12px;">

            <!-- LEFT ICON (ONLY WHEN PANEL CLOSED) -->
            <template if:false={leftPanelOpen}>
                <div onclick={toggleLeftPanel}
                     style="position:absolute;top:0;left:0;width:28px;height:28px;
                            border:1px solid #d8dde6;border-radius:4px;
                            display:flex;align-items:center;justify-content:center;
                            cursor:pointer;background:white;z-index:5;">
                    ☰
                </div>
            </template>

            <!-- RECORD DETAIL -->
            <template if:true={recordSelected}>
                <div class="slds-box slds-theme_default" style="margin-top:0;
                            margin-bottom:12px;background:#f3f6ff;">

                    <lightning-record-form
                        record-id={selectedRecordId}
                        object-api-name={selectedObjectApi}
                        layout-type="Compact"
                        mode="view"
                        columns="2">
                    </lightning-record-form>
                </div>
            </template>

            <!-- CANVAS -->
            <template if:true={canvasVisible}>
                <div class="canvas-area"
                     onmousedown={startCanvasDrag}
                     style="position:absolute;top:0;left:0;right:0;bottom:0;
                            background:#eef4ff;overflow:hidden;">

                    <svg style="position:absolute;top:0;left:0;width:100%;height:100%;
                                z-index:1;pointer-events:none;">
                        <template for:each={canvasLinks} for:item="link">
                            <path key={link.id}
                                  d={link.d}
                                  stroke="#0176d3"
                                  stroke-width="2"
                                  fill="none">
                            </path>
                        </template>
                    </svg>

                    <template for:each={canvasNodes} for:item="node">
                        <div key={node.name}
                             class="canvas-node"
                             data-name={node.name}
                             onclick={handleCanvasClick}
                             onmousedown={startDrag}
                             style="position:absolute;width:120px;height:60px;
                             border-radius:6px;background:white;border:2px solid #0176d3;
                             display:flex;flex-direction:column;align-items:center;
                             justify-content:center;cursor:pointer;z-index:2;">
                            <lightning-icon icon-name={node.icon} size="small"></lightning-icon>
                            <div>{node.label}</div>
                            <div>{node.count}</div>
                        </div>
                    </template>
                    
                    <div style="position:absolute;top:10px;right:10px;z-index:10;">
                        <lightning-button-icon icon-name="utility:zoom_in" 
                        onclick={zoomIn}></lightning-button-icon>

                        <lightning-button-icon icon-name="utility:zoom_out" 
                        class="slds-m-left_x-small" onclick={zoomOut}></lightning-button-icon>
                    </div>
                </div>
            </template>

        </div>

        <!-- RIGHT PANEL (unchanged logic) -->
        <template if:true={rightPanelVisible}>
            <div style="width:320px;background:#f8faff;border-left:2px solid #0176d3;
                        padding:12px;position:relative;overflow:hidden;">

                <div class="slds-text-title_bold slds-m-bottom_small">
                    {rightPanelTitle}
                </div>

                <!-- LIST MODE -->
                <template if:true={isRightPanelList}>
                    <div style="max-height:calc(100% - 10px);overflow:auto;">
                        <template if:true={hasRightPanelRecords}>
                            <template for:each={rightPanelRecords} for:item="rec">
                                <div key={rec.recordId}
                                     data-id={rec.recordId}
                                     data-object={rec.objectApiName}
                                     onclick={handlePanelRecordClick}
                                     class="slds-box slds-m-bottom_x-small"
                                     style="cursor:pointer;">
                                    <div class="slds-text-title slds-truncate">{rec.recordName}</div>
                                </div>
                            </template>
                        </template>

                        <template if:false={hasRightPanelRecords}>
                            <div class="slds-text-color_weak slds-p-around_medium">
                                No records found
                            </div>
                        </template>
                    </div>
                </template>

                <!-- DETAIL MODE -->
                <template if:true={isRightPanelDetail}>
                    <div style="max-height:calc(100% - 70px);overflow:auto;">
                        <lightning-record-form
                            record-id={selectedPanelRecordId}
                            object-api-name={selectedPanelObjectApi}
                            layout-type="Compact"
                            mode="view"
                            columns="1">
                        </lightning-record-form>
                    </div>

                    <div class="slds-grid slds-gutters slds-m-top_small">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-button label="Back" onclick={handleBack}></lightning-button>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-text-align_right">
                            <lightning-button label="View" variant="brand" onclick={handleView}></lightning-button>
                        </div>
                    </div>
                </template>

            </div>
        </template>

    </div>

</template>
