<template>

    <lightning-card title="Deployment Center">

        <div class="slds-p-around_medium">

            <!-- Row 1 -->

            <div class="slds-grid slds-gutters">

                <div class="slds-col">

                    <lightning-combobox
                        label="Source Org"
                        value={sourceOrg}
                        options={environmentOptions}
                        onchange={handleSourceChange}>
                    </lightning-combobox>

                </div>

                <div class="slds-col">

                    <lightning-combobox
                        label="Target Org"
                        value={targetOrg}
                        options={environmentOptions}
                        onchange={handleTargetChange}>
                    </lightning-combobox>

                </div>

            </div>

            <template if:true={showDeploymentSection}>

                <!-- Row 2 -->

                <div class="slds-grid slds-gutters slds-m-top_medium">

                    <div class="slds-col">

                        <lightning-combobox
                            label="Release"
                            value={releaseId}
                            options={releaseOptions}
                            onchange={handleReleaseChange}>
                        </lightning-combobox>

                    </div>

                    <div class="slds-col">

                        <lightning-combobox
                            label="User Story"
                            value={userStoryId}
                            options={userStoryOptions}
                            onchange={handleUserStoryChange}>
                        </lightning-combobox>

                    </div>

                </div>

                <template if:true={showBranchSelection}>
                    <div class="slds-grid slds-gutters slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox
                                label="Verify Developer Source Branch"
                                value={selectedSourceBranch}
                                options={matchingBranchOptions}
                                onchange={handleBranchChange}
                                required>
                            </lightning-combobox>
                        </div>
                    </div>
                </template>

                <!-- Row 3 -->

                <div class="slds-grid slds-gutters slds-m-top_medium">

                    <div class="slds-col slds-size_1-of-3">

                        <div class="slds-form-element metadata-combobox-container">
                            <label class="slds-form-element__label" for="metadata-type-input">Metadata Type</label>
                            <div class="slds-form-element__control">
                                <div class="slds-combobox_container">
                                    <div class={comboboxClass}>
                                        <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                                            <input
                                                type="text"
                                                class="slds-input slds-combobox__input"
                                                id="metadata-type-input"
                                                placeholder="Select Metadata Type"
                                                value={metadataTypeInputValue}
                                                oninput={handleMetadataTypeSearch}
                                                onclick={handleMetadataTypeClick}
                                                role="combobox"
                                                aria-autocomplete="list"
                                                aria-expanded={isMetadataDropdownOpen}
                                            />
                                            <span class="slds-icon_container slds-icon-utility-down slds-input__icon slds-input__icon_right">
                                                <lightning-icon icon-name="utility:down" size="x-small" class="slds-icon-text-default"></lightning-icon>
                                            </span>
                                        </div>
                                        <template if:true={isMetadataDropdownOpen}>
                                            <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid metadata-dropdown-list" role="listbox">
                                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                    <template if:true={hasFilteredMetadataTypes}>
                                                        <template for:each={processedMetadataTypes} for:item="type">
                                                            <li key={type.value} role="presentation" class="slds-listbox__item" data-value={type.value} onclick={handleMetadataTypeSelect}>
                                                                <div class={type.optionClass} role="option">
                                                                    <span class="slds-media__figure slds-listbox__option-icon">
                                                                        <template if:true={type.isSelected}>
                                                                            <lightning-icon icon-name="utility:check" size="x-small" class="slds-icon-text-default"></lightning-icon>
                                                                        </template>
                                                                    </span>
                                                                    <span class="slds-media__body">
                                                                        <span class="slds-listbox__option-text slds-listbox__option-text_entity">{type.label}</span>
                                                                    </span>
                                                                </div>
                                                            </li>
                                                        </template>
                                                    </template>
                                                    <template if:false={hasFilteredMetadataTypes}>
                                                        <li role="presentation" class="slds-listbox__item">
                                                            <div class="slds-align_absolute-center slds-p-around_small" role="option">
                                                                No metadata types found
                                                            </div>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="slds-col slds-size_2-of-3">

                        <lightning-input
                            type="search"
                            label="Search Metadata"
                            value={searchKeyword}
                            onchange={handleSearch}>
                        </lightning-input>

                    </div>

                </div>

                <!-- Row 4 -->

                <div class="slds-grid slds-gutters slds-m-top_medium">
                
                    <!-- Available Components -->
                
                    <div class="slds-col slds-size_1-of-2">
                    
                        <lightning-card title="Available Components">
                        
                            <div
                                class="slds-box slds-scrollable_y"
                                style="
                                    height:500px;
                                    min-height:500px;
                                ">
                        
                                <template
                                    for:each={filteredMetadataList}
                                    for:item="item">
                        
                                    <div
                                        key={item.value}
                                        data-label={item.label}
                                        data-value={item.value}
                                        onclick={handleMetadataSelect}
                                        class="
                                            slds-p-around_small
                                            slds-border_bottom
                                            slds-theme_default
                                            slds-truncate"
                                        style="
                                            cursor:pointer;
                                        ">
                        
                                        {item.label}
                        
                                    </div>
                                
                                </template>
                            
                            </div>
                        
                        </lightning-card>
                    
                    </div>
                
                    <!-- Selected Components -->
                
                    <div class="slds-col slds-size_1-of-2">
                    
                        <lightning-card title="Selected Components">
                        
                            <div
                                class="slds-box slds-scrollable_y"
                                style="
                                    height:500px;
                                    min-height:500px;
                                ">
                        
                                <template
                                    for:each={selectedComponents}
                                    for:item="item">
                        
                                    <div
                                        key={item.value}
                                        class="
                                            slds-grid
                                            slds-grid_align-spread
                                            slds-p-around_small
                                            slds-border_bottom">
                        
                                        <div
                                            class="slds-truncate"
                                            title={item.label}>
                        
                                            {item.label}
                        
                                        </div>
                                    
                                        <div>
                                        
                                            <lightning-button-icon
                                        
                                                icon-name="utility:close"
                                        
                                                alternative-text="Remove"
                                        
                                                data-value={item.value}
                                        
                                                onclick={handleRemoveComponent}
                                        
                                                variant="bare">
                                        
                                            </lightning-button-icon>
                                        
                                        </div>
                                    
                                    </div>
                                
                                </template>
                            
                            </div>
                        
                        </lightning-card>
                    
                    </div>
                
                </div>

                <!-- Row 5 -->

                <div
                    class="
                        slds-m-top_large
                        slds-align_absolute-center">

                    <template if:true={showSaveButton}>
                        <lightning-button
                            label="Save"
                            variant="success"
                            onclick={handleSave}>
                        </lightning-button>
                    </template>

                    <template if:true={showValidateButton}>
                        <lightning-button
                            label="Validate"
                            variant="neutral"
                            onclick={handleValidate}>
                        </lightning-button>
                    </template>

                    <template if:true={showDeployButton}>
                        <lightning-button
                            label="Deploy"
                            variant="brand"
                            onclick={handleDeploy}>
                        </lightning-button>
                    </template>

                </div>

                <template if:true={compareResults.length}>

                    <div class="slds-m-top_large">
                    
                        <lightning-card
                            title="Comparison Results">
                    
                            <div
                                class="slds-scrollable_y"
                                style="max-height:400px;">
                    
                                <table
                                    class="
                                        slds-table
                                        slds-table_cell-buffer
                                        slds-table_bordered">
                    
                                    <thead>
                                    
                                        <tr>
                                        
                                            <th>
                                                Component
                                            </th>
                                        
                                            <th>
                                                Status
                                            </th>
                                        
                                        </tr>
                                    
                                    </thead>
                                
                                    <tbody>
                                    
                                        <template
                                            for:each={compareResults}
                                            for:item="item">
                                    
                                            <tr
                                                key={item.componentName}>
                                    
                                                <td>
                                                    {item.componentName}
                                                </td>
                                            
                                                <td>
                                                    {item.status}
                                                </td>
                                            
                                            </tr>
                                        
                                        </template>
                                    
                                    </tbody>
                                
                                </table>
                            
                            </div>
                        
                        </lightning-card>
                    
                    </div>
                
                </template>

                <template if:true={validationResults.length}>

                    <div class="slds-m-top_large">
                    
                        <lightning-card
                            title="Validation Results">
                    
                            <div
                                class="slds-scrollable_y"
                                style="
                                    max-height:400px;
                                ">
                    
                                <table
                                    class="
                                        slds-table
                                        slds-table_cell-buffer
                                        slds-table_bordered">
                    
                                    <thead>
                                    
                                        <tr>
                                        
                                            <th>
                                                Check Name
                                            </th>

                                            <th>
                                                Status
                                            </th>

                                            <th>
                                                Message
                                            </th>
                                        
                                        </tr>
                                    
                                    </thead>
                                
                                    <tbody>
                                    
                                        <template
                                            for:each={validationResults}
                                            for:item="item">
                                    
                                            <tr
                                                key={item.checkName}>
                                    
                                                <td>
                                                    {item.checkName}
                                                </td>
                                                
                                                <td>
                                                    {item.status}
                                                </td>
                                                
                                                <td>
                                                    {item.message}
                                                </td>
                                            
                                            </tr>
                                        
                                        </template>
                                    
                                    </tbody>
                                
                                </table>
                            
                            </div>
                        
                        </lightning-card>
                    
                    </div>
                
                </template>
 
                <!-- Real-time Deployment Logs Section -->
                <template if:true={isDeploying}>
                    <div class="slds-m-top_large">
                        <lightning-card title="Deployment Execution Status & Logs">
                            <div class="slds-p-around_medium slds-theme_shade slds-m-bottom_small">
                                <div class="slds-grid slds-grid_align-spread">
                                    <div>
                                        <span class="slds-text-title_bold">Deployment Request Status: </span>
                                        <span class={statusBadgeClass}>{deploymentStatus}</span>
                                    </div>
                                    <template if:true={isWaitingMerge}>
                                        <div class="slds-text-color_weak slds-italic" style="color: #ff9900; font-weight: bold; font-size: 13px;">
                                            Please merge the Pull Request on GitHub to trigger Salesforce Deployment.
                                        </div>
                                    </template>
                                </div>
                                <div class="slds-m-top_small">
                                    <lightning-progress-bar value={deploymentProgress} size="large"></lightning-progress-bar>
                                </div>
                                <template if:true={pollingMessage}>
                                    <div class="slds-m-top_small slds-p-around_x-small slds-theme_warning slds-text-color_weak slds-text-body_small" style="background-color: #fcf8e3; border: 1px solid #faebcc; border-radius: 4px; color: #8a6d3b;">
                                        <strong>System Status Details:</strong> {pollingMessage}
                                    </div>
                                </template>
                            </div>
                            <div class="slds-box slds-theme_default slds-scrollable_y" style="height: 300px; font-family: monospace; background-color: #0b0f19; color: #00ff66; padding: 10px;">
                                <template for:each={deploymentLogs} for:item="log">
                                    <div key={log.Id} class="slds-p-vertical_xx-small">
                                        <span style="color: #888888;">[{log.formattedTime}]</span> 
                                        <span style="color: #ffcc00; font-weight: bold;">[{log.Log_Type__c}]</span> 
                                        <span> {log.Message__c}</span>
                                    </div>
                                </template>
                            </div>
                        </lightning-card>
                    </div>
                </template>

            </template>
 
        </div>
 
    </lightning-card>
 
</template>
